{{- if .Values.elasticsearch.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "growi.fullname" . }}-test-elasticsearch"
  labels:
    {{- include "growi.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthcheck
      image: busybox
      command:
        - sh
        - -c
        - |
          echo "Testing Elasticsearch cluster health..."
          wget -qO- http://{{ include "growi.elasticsearch.fullname" . }}:9200/_cluster/health && echo "OK" || exit 1
{{- end }}
