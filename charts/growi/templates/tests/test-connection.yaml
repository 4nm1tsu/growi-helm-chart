apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "growi.fullname" . }}-test-connection"
  labels:
    {{- include "growi.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthcheck
      image: busybox
      command:
        - sh
        - -c
        - |
          echo "Testing GROWI healthcheck..."
          wget -qO- http://{{ include "growi.fullname" . }}:{{ .Values.service.port }}/_api/v3/healthcheck && echo "OK" || exit 1
